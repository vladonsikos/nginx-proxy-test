events {
    worker_connections 1024;
}

http {
    # Upstream для nginx2
    upstream nginx2_backend {
        server nginx2:80;
    }
    
    # Upstream для приложения напрямую
    upstream app_backend {
        server app:8000;
    }
    
    # Upstream для nginx3
    upstream nginx3_backend {
        server nginx3:80;
    }
    
    server {
        listen 80;
        server_name _;
        
        # Логирование для отладки
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
        
        # Маршрут через цепочку nginx1 -> nginx2 -> nginx3 -> app
        location /chain/ {
            # Удаляем любой X-Forwarded-For от клиента (защита от подделки)
            proxy_set_header X-Forwarded-For "";
            
            # Добавляем реальный IP клиента
            proxy_set_header X-Forwarded-For $remote_addr;
            
            # Добавляем X-Real-IP
            proxy_set_header X-Real-IP $remote_addr;
            
            # Проксируем на nginx2
            proxy_pass http://nginx2_backend/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        
        # Маршрут напрямую к приложению
        location /direct/ {
            # Удаляем любой X-Forwarded-For от клиента
            proxy_set_header X-Forwarded-For "";
            
            # Добавляем реальный IP клиента
            proxy_set_header X-Forwarded-For $remote_addr;
            
            # Добавляем X-Real-IP
            proxy_set_header X-Real-IP $remote_addr;
            
            # Проксируем на приложение
            proxy_pass http://app_backend/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        
        # Маршрут через nginx1 -> nginx3 -> app
        location /short-chain/ {
            # Удаляем любой X-Forwarded-For от клиента
            proxy_set_header X-Forwarded-For "";
            
            # Добавляем реальный IP клиента
            proxy_set_header X-Forwarded-For $remote_addr;
            
            # Добавляем X-Real-IP
            proxy_set_header X-Real-IP $remote_addr;
            
            # Проксируем на nginx3
            proxy_pass http://nginx3_backend/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        
        # Health check
        location /health {
            return 200 'nginx1 OK';
            add_header Content-Type text/plain;
        }
    }
}
