events {
    worker_connections 1024;
}

http {
    # Upstream для nginx3
    upstream nginx3_backend {
        server nginx3:80;
    }
    
    server {
        listen 80;
        server_name _;
        
        # Логирование для отладки
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
        
        location / {
            # Добавляем свой IP к X-Forwarded-For
            # $remote_addr здесь будет IP предыдущего nginx или клиента
            proxy_set_header X-Forwarded-For "${http_x_forwarded_for}, $remote_addr";
            
            # Проксируем на nginx3
            proxy_pass http://nginx3_backend;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        
        # Health check
        location /health {
            return 200 'nginx2 OK';
            add_header Content-Type text/plain;
        }
    }
}
